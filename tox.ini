[tox]
minversion = 4.0
envlist =
    py39
    py310
    py311
    py312
    py313
skip_missing_interpreters = true

[testenv]
description = Run unit tests with coverage (integration tests excluded)
deps =
    -rrequirements.txt
    -rtest-requirements.txt
commands =
    pytest tests/ --ignore=tests/integration --cov=vobiz --cov-report=term-missing

setenv =
    PYTHONPATH = {toxinidir}/

[testenv:integration]
description = Run live integration tests (requires VOBIZ credentials and optional test IDs)
deps =
    -rrequirements.txt
    -rtest-requirements.txt
commands =
    pytest tests/integration -v --cov=vobiz --cov-report=term-missing
passenv =
    VOBIZ_*
