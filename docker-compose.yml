version: '3'

services:

  pythonSDK:
    build:
      context: .
    image: pythonsdk
    container_name: pythonSDK
    environment:
      - VOBIZ_AUTH_ID=${VOBIZ_AUTH_ID}
      - VOBIZ_AUTH_TOKEN=${VOBIZ_AUTH_TOKEN}
      - VOBIZ_API_DEV_HOST=${VOBIZ_API_DEV_HOST}
      - VOBIZ_API_PROD_HOST=${VOBIZ_API_PROD_HOST}
    volumes:
      - .:/usr/src/app
    stdin_open: true
    tty: true